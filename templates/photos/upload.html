{% extends 'base.html' %}

{% block content %}

<div style="background:white; border:1px solid #dbdbdb; border-radius:10px; padding:30px; max-width:450px; margin:auto;">
    
    <h2 style="text-align:center; margin-bottom:25px; font-size:20px;">📷 Nouvelle Publication</h2>

    <form method="POST" enctype="multipart/form-data">
        {% csrf_token %}
        
        <div style="margin-bottom:18px;">
            <label style="font-size:14px; font-weight:600; display:block; margin-bottom:6px;">Photo</label>
            <input type="file" name="image" accept="image/*" required
                style="width:100%; padding:10px; border:1px solid #dbdbdb; border-radius:8px; font-size:14px;">
        </div>

        <div style="margin-bottom:18px;">
            <label style="font-size:14px; font-weight:600; display:block; margin-bottom:6px;">Description</label>
            <textarea name="caption" rows="4" placeholder="Ecrivez une description..."
                style="width:100%; padding:10px; border:1px solid #dbdbdb; border-radius:8px; font-size:14px; resize:none; outline:none;"></textarea>
        </div>

        <button type="submit"
            style="width:100%; background:#0095f6; color:white; border:none; padding:10px; border-radius:8px; font-size:15px; font-weight:600; cursor:pointer;">
            Partager
        </button>

        <a href="{% url 'feed' %}" 
            style="display:block; text-align:center; margin-top:12px; color:#8e8e8e; font-size:14px; text-decoration:none;">
            Annuler
        </a>
    </form>

</div>

{% endblock %}
