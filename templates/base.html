<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PhotoShare</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #fafafa;
            color: #262626;
        }

        nav {
            background: white;
            border-bottom: 1px solid #dbdbdb;
            position: sticky;
            top: 0;
            z-index: 999;
        }

        .nav-inner {
            max-width: 975px;
            margin: auto;
            padding: 0 20px;
            height: 54px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .nav-logo {
            font-size: 24px;
            font-weight: 700;
            color: #262626;
            text-decoration: none;
            font-family: 'Georgia', serif;
            letter-spacing: -1px;
        }

        .nav-links {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .nav-links a {
            text-decoration: none;
            color: #262626;
            font-size: 14px;
            font-weight: 500;
        }

        .nav-links a:hover { color: #8e8e8e; }

        .nav-user {
            font-size: 14px;
            font-weight: 600;
        }

        .btn-upload {
            background: #0095f6;
            color: white !important;
            padding: 7px 16px;
            border-radius: 8px;
            font-weight: 600;
            font-size: 14px;
        }

        .btn-upload:hover { background: #1877f2 !important; }

        .container {
            max-width: 614px;
            margin: 30px auto;
            padding: 0 15px;
        }
    </style>
</head>
<body>

<nav>
    <div class="nav-inner">
        <a href="{% url 'feed' %}" class="nav-logo">📷 PhotoShare</a>
        <div class="nav-links">
            {% if user.is_authenticated %}
                <span class="nav-user">👤 {{ user.username }}</span>
                <a href="{% url 'upload' %}" class="btn-upload">+ Publier</a>
                <a href="{% url 'logout' %}">Déconnexion</a>
            {% else %}
                <a href="{% url 'login' %}">Connexion</a>
                <a href="{% url 'register' %}">Inscription</a>
            {% endif %}
        </div>
    </div>
</nav>

<div class="container">
    {% block content %}
    {% endblock %}
</div>

</body>
</html>
